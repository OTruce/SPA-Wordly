<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Wordly Dictionary</h1>
        <!-- <p>Your quick and interactive word helper</p> -->
    </header>

    <main>
        <form id="searchForm" aria-label="Search for a word">
            <input type="text" id="wordInput" placeholder="Enter a word..." aria-label="Word input" required>
            <button type="submit">Search</button>
        </form>

        <p id="errorMessage"></p>

        <section id="resultsSection" class="hidden">
            <h2 id="wordTitle"></h2>
            <p id="phonetic"></p>

            <h3>Definition</h3>
            <p id="definition"></p>

            <h3>Example</h3>
            <p id="example"></p>

            <h3>Synonyms</h3>
            <ul id="synonymsList"></ul>
        </section>
    </main>

    <footer>
        <p>Wordly (SPA) Single Page Application</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
